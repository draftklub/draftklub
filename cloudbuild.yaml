# DraftKlub — Cloud Build Pipeline
# Trigger: push na branch main
# Fluxo: lint/typecheck/test → build imagens → push → migrate → deploy

steps:
  # ─────────────────────────────────────────
  # STEP 1: CI — install, typecheck, lint, test
  # ─────────────────────────────────────────
  - name: 'node:24-alpine'
    id: ci
    entrypoint: sh
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@10.6.5 --activate
        pnpm install --frozen-lockfile
        pnpm --filter @draftklub/api exec prisma generate
        pnpm turbo run typecheck lint test

  # ─────────────────────────────────────────
  # STEP 2: Build imagem API
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-api
    args:
      - build
      - '-f'
      - 'apps/api/Dockerfile'
      - '-t'
      - '$_API_IMAGE:$COMMIT_SHA'
      - '-t'
      - '$_API_IMAGE:latest'
      - '--cache-from'
      - '$_API_IMAGE:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'
    waitFor: ['ci']

  # ─────────────────────────────────────────
  # STEP 3: Build imagem Worker
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: build-worker
    args:
      - build
      - '-f'
      - 'apps/worker/Dockerfile'
      - '-t'
      - '$_WORKER_IMAGE:$COMMIT_SHA'
      - '-t'
      - '$_WORKER_IMAGE:latest'
      - '--cache-from'
      - '$_WORKER_IMAGE:latest'
      - '--build-arg'
      - 'BUILDKIT_INLINE_CACHE=1'
      - '.'
    waitFor: ['ci']

  # ─────────────────────────────────────────
  # STEP 4: Push imagem API
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-api
    args:
      - push
      - '--all-tags'
      - '$_API_IMAGE'
    waitFor: ['build-api']

  # ─────────────────────────────────────────
  # STEP 5: Push imagem Worker
  # ─────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: push-worker
    args:
      - push
      - '--all-tags'
      - '$_WORKER_IMAGE'
    waitFor: ['build-worker']

  # ─────────────────────────────────────────
  # STEP 6: Rodar migrations (Cloud Run Job)
  # ─────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    id: migrate
    entrypoint: sh
    args:
      - '-c'
      - |
        gcloud run jobs update draftklub-migrate \
          --project=$_PROJECT_ID \
          --region=$_REGION \
          --image=$_API_IMAGE:$COMMIT_SHA \
          --command="sh" \
          --args="-c,cd /app/apps/api && node_modules/.bin/prisma migrate deploy"
        gcloud run jobs execute draftklub-migrate \
          --project=$_PROJECT_ID \
          --region=$_REGION \
          --wait
    waitFor: ['push-api']

  # ─────────────────────────────────────────
  # STEP 7: Deploy API
  # ─────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    id: deploy-api
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - draftklub-api
      - '--project=$_PROJECT_ID'
      - '--region=$_REGION'
      - '--image=$_API_IMAGE:$COMMIT_SHA'
    waitFor: ['migrate']

  # ─────────────────────────────────────────
  # STEP 8: Deploy Worker
  # ─────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    id: deploy-worker
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - draftklub-worker
      - '--project=$_PROJECT_ID'
      - '--region=$_REGION'
      - '--image=$_WORKER_IMAGE:$COMMIT_SHA'
    waitFor: ['push-worker', 'migrate']

  # ─────────────────────────────────────────
  # STEP 9: Health check pós-deploy
  # ─────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk:alpine'
    id: health-check
    entrypoint: sh
    args:
      - '-c'
      - |
        echo "Aguardando deploy estabilizar..."
        sleep 10
        URL=$(gcloud run services describe draftklub-api \
          --project=$_PROJECT_ID \
          --region=$_REGION \
          --format="value(status.url)")
        echo "URL: $$URL"
        STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: Bearer $(gcloud auth print-identity-token)" \
          "$$URL/health")
        echo "Health check status: $$STATUS"
        if [ "$$STATUS" != "200" ]; then
          echo "Health check falhou com status $$STATUS"
          exit 1
        fi
        echo "Health check OK"
    waitFor: ['deploy-api']

substitutions:
  _PROJECT_ID: 'draftklub-dev'
  _REGION: 'southamerica-east1'
  _API_IMAGE: 'southamerica-east1-docker.pkg.dev/draftklub-dev/draftklub/api'
  _WORKER_IMAGE: 'southamerica-east1-docker.pkg.dev/draftklub-dev/draftklub/worker'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: '1800s'
